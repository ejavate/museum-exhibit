
name: CI-Package
permissions:
  contents: write
  packages: write

on:
  workflow_run:
    workflows: ["CI-Build"]
    types:
      - completed
    branches:
      - main

jobs:
  package-and-update-bom:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Generate EJ-CI-Packager App Token
        id: packager-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.EJ_CI_PACKAGER_APP_ID }}
          private_key: ${{ secrets.EJ_CI_PACKAGER_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ steps.packager-token.outputs.token }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ steps.packager-token.outputs.token }}

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/museum-exhibit:${{ github.sha }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/museum-exhibit:${{ github.sha }}

      - name: Get image digest
        id: get_digest
        run: |
          echo "digest=$(docker inspect --format='{{index .RepoDigests 0}}' ghcr.io/${{ github.repository_owner }}/museum-exhibit:${{ github.sha }})" >> $GITHUB_OUTPUT

      - name: Clone museum-bom repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/museum-bom
          token: ${{ steps.packager-token.outputs.token }}
          path: museum-bom
          fetch-depth: 0

      - name: Update bom.json with jq
        run: |
          cd museum-bom
          if [ ! -f bom.json ]; then echo '{"schema":"v1","Components":{}}' > bom.json; fi
          updatedAt=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          jq --arg updatedAt "$updatedAt" \
             --arg component "museum-exhibit" \
             --arg deployType "container" \
             --arg repo "${{ github.repository }}" \
             --arg image "ghcr.io/${{ github.repository_owner }}/museum-exhibit" \
             --arg tag "${{ github.sha }}" \
             --arg digest "${{ steps.get_digest.outputs.digest }}" \
             --arg commit "${{ github.sha }}" \
             '.updatedAt = $updatedAt |
                .Components[$component] = {
                  deployType: $deployType,
                  repo: $repo,
                  Image: $image,
                  tag: $tag,
                  digest: $digest,
                  commit: $commit
                }' bom.json > bom.json.tmp && mv bom.json.tmp bom.json

      - name: Commit and push bom.json
        run: |
          cd museum-bom
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bom.json
          git commit -m "Update BOM for museum-exhibit ${{ github.sha }}" || echo "No changes to commit"
          git push


