
name: CI-Package
permissions:
  contents: write
  packages: write

on:
  workflow_run:
    workflows: ["CI-Build"]
    types:
      - completed
    branches:
      - main

jobs:
  package-and-update-bom:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Generate EJ-CI-Packager App Token
        id: packager-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.EJ_CI_PACKAGER_APP_ID }}
          private_key: ${{ secrets.EJ_CI_PACKAGER_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ steps.packager-token.outputs.token }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/museum-exhibit:${{ github.sha }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/museum-exhibit:${{ github.sha }}

      - name: Get image digest
        id: get_digest
        run: |
          echo "digest=$(docker inspect --format='{{index .RepoDigests 0}}' ghcr.io/${{ github.repository_owner }}/museum-exhibit:${{ github.sha }})" >> $GITHUB_OUTPUT

      # Trigger BOM update workflow in museum-bom repo
      - name: Trigger BOM update in museum-bom
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ steps.packager-token.outputs.token }}" \
            https://api.github.com/repos/${{ github.repository_owner }}/museum-bom/dispatches \
            -d '{
              "event_type": "bom-update",
              "client_payload": {
                "component": "museum-exhibit",
                "deployType": "container",
                "repo": "${{ github.repository }}",
                "image": "ghcr.io/${{ github.repository_owner }}/museum-exhibit",
                "tag": "${{ github.sha }}",
                "digest": "${{ steps.get_digest.outputs.digest }}",
                "commit": "${{ github.sha }}"
              }
            }'


