name: CI-Build

permissions:
  security-events: write
  actions: read
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate EJ-CI-Builder App Token
        id: builder-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.EJ_CI_BUILDER_APP_ID }}
          private_key: ${{ secrets.EJ_CI_BUILDER_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ steps.builder-token.outputs.token }}
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run dotnet format (linter)
        run: dotnet format --verify-no-changes

      - name: Run Super-Linter
        uses: github/super-linter@v6
        env:
          VALIDATE_CSHARP: true
          VALIDATE_JSON: true
          VALIDATE_YAML: true
          GITHUB_TOKEN: ${{ steps.builder-token.outputs.token }}

      - name: Run CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
